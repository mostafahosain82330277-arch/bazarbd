<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders | BAZARBD</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Hind Siliguri', sans-serif;
    }
  </style>
</head>

<body class="bg-gray-100 p-4">

  <h1 class="text-3xl font-bold mb-4">📦 Your Orders</h1>

  <div id="orders-container"></div>

  <a href="index.html" class="block mt-4 text-center bg-blue-600 text-white py-2 rounded">
    ⬅ Back to Shop
  </a>

  <script>
    let orders = JSON.parse(localStorage.getItem('orders')) || [];

    function loadOrders() {
      let container = document.getElementById('orders-container');

      if (orders.length === 0) {
        container.innerHTML = "<p class='text-red-500'>❌ কোনো অর্ডার নেই</p>";
        return;
      }

      container.innerHTML = '';

      orders.forEach((order, index) => {
        container.innerHTML += `
          <div class="bg-white p-4 rounded shadow mb-3">
            <p><strong>👤 Name:</strong> ${order.name}</p>
            <p><strong>📞 Phone:</strong> ${order.phone}</p>
            <p><strong>📍 Address:</strong> ${order.address}</p>
            <p><strong>💳 Payment:</strong> ${order.payment}</p>
            <p class="font-bold text-green-600">💰 Total: ৳ ${order.total}</p>

            <button onclick="deleteOrder(${index})"
              class="mt-2 bg-red-500 text-white px-3 py-1 rounded">
              ❌ Delete
            </button>
          </div>
        `;
      });
    }

    function deleteOrder(index) {
      let orders = JSON.parse(localStorage.getItem('orders')) || [];
      orders.splice(index, 1);
      localStorage.setItem('orders', JSON.stringify(orders));
      location.reload();
    }

    loadOrders();
  </script>

</body>
</html>
